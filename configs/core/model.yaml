models:
  large_dataset_safety:
    enabled: true
    medium_threshold: 4000
    large_threshold: 20000
    huge_threshold: 50000
    extreme_threshold: 100000
    huge_predict_chunk_size: 2000
    extreme_predict_chunk_size: 1200
    huge_umec_fit_sample_rows: 2000
    extreme_umec_fit_sample_rows: 1200
    huge_semantic_max_fit_rows: 1000
    extreme_semantic_max_fit_rows: 600
    huge_semantic_embedding_dim: 50
    extreme_semantic_embedding_dim: 40
    huge_semantic_n_jobs: 1
    extreme_semantic_n_jobs: 1
    huge_semantic_workers: 1
    extreme_semantic_workers: 1
  token_matching:
    ngram_range: [1, 2]
    lowercase: true
    use_idf: true
    sublinear_tf: true
    normalize_tokens: true
  equipment_based:
    ngram_range: [1, 2]
    lowercase: true
    use_idf: true
    sublinear_tf: true
    normalize_tokens: true
    default_prominence: 0.25
  semantic_similarity:
    n_jobs: 4
    embedding_dim: 100
    window: 5
    min_count: 2
    workers: 4
    sg: 1
    epochs: 5
    use_sif: true
    sif_a: 0.001
    remove_pc: true
    random_state: 42
    show_progress: false
    cwem_augment: true
    cwem_repeats: 2
    max_fit_rows: null
  umec:
    ecoc:
      scheme: pairwise
      custom_matrix: null
    aggregation: spectral
    spectral:
      enabled: true
      components: 3
      use_third_moment: true
    decode:
      prior_weight: 0.35
      allow_unclassified: true
      unclassified_threshold: -4.5
